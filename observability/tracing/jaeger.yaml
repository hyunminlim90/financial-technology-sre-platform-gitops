apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: tracing
data:
  config.yaml: |
    service:
      extensions:
      - jaeger_storage
      - jaeger_query
      pipelines:
        traces:
          receivers:
          - otlp
          processors:
          - batch
          exporters:
          - jaeger_storage_exporter

    extensions:
      jaeger_query:
        storage:
          traces: esstore
        http:
          endpoint: 0.0.0.0:16686

      jaeger_storage:
        backends:
          esstore:
            elasticsearch:
              server_urls:
              - https://tracing-es-es-http.tracing.svc.cluster.local:9200
              auth:
                basic:
                  username: ${env:ES_USERNAME}
                  password: ${env:ES_PASSWORD}
              tls:
                insecure_skip_verify: true

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

    exporters:
      jaeger_storage_exporter:
        trace_storage: esstore
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: tracing
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      nodeSelector:
        node-role: observability
      containers:
      - name: jaeger
        image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
        args:
        - "--config"
        - "/jaeger/config.yaml"
        env:
        - name: ES_USERNAME
          valueFrom:
            secretKeyRef:
              name: jaeger-es-secret
              key: username
        - name: ES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jaeger-es-secret
              key: password
        ports:
        - name: ui
          containerPort: 16686
        - name: otlp-grpc
          containerPort: 4317
        - name: otlp-http
          containerPort: 4318
        resources:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        volumeMounts:
        - name: jaeger-config
          mountPath: /jaeger/config.yaml
          subPath: config.yaml
      volumes:
      - name: jaeger-config
        configMap:
          name: jaeger-config
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: tracing
spec:
  selector:
    app: jaeger
  ports:
  - name: ui
    port: 16686
    targetPort: 16686
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318