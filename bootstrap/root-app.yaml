apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ft-sre-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hyunminlim90/financial-technology-sre-platform-gitops.git
    targetRevision: main
    path: bootstrap
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true