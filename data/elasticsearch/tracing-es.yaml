apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: tracing-es
  namespace: tracing
spec:
  version: 8.17.0

  nodeSets:
  - name: default
    count: 1

    config:
      node.store.allow_mmap: false
      xpack.security.enabled: true

    podTemplate:
      spec:
        nodeSelector:
          node-role: data
        containers:
        - name: elasticsearch
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          env:
          - name: ES_JAVA_OPTS
            value: "-Xms1g -Xmx1g"

    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 30Gi